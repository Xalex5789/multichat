<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeve — Chat Uno</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Antique&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Special+Elite&family=Rajdhani:wght@400;700&family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root{
      --traje:#1e1c1a;--traje-light:#2a2826;--guante:#363432;
      --camisa:#dedad4;--camisa-dim:rgba(222,218,212,0.55);--camisa-muted:rgba(222,218,212,0.35);
      --corbata:#c8251c;--corbata-soft:rgba(200,37,28,0.15);--corbata-dim:rgba(200,37,28,0.08);
      --shadow:2px 3px 0 rgba(10,8,6,0.35);
      --font-title:'Zen Antique',serif;--font-body:'Crimson Pro',serif;--font-mono:'Special Elite',monospace;
      --msg-w:520px;--msg-font:15px;--name-font:14px;--avatar-size:44px;--emote-size:26px;
      --platform-color:#c8251c;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;background:transparent;overflow:hidden;}
    body{display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-start;padding:18px 22px;font-family:var(--font-body);}
    #chat-container{display:flex;flex-direction:column;gap:0;width:var(--msg-w);max-width:100%;position:relative;}

    /* ── Mensaje ── */
    .msg-wrap{width:100%;animation:msgSlideIn 0.35s cubic-bezier(0.22,1,0.36,1);}
    @keyframes msgSlideIn{
      from{opacity:0;transform:translateX(-24px) scale(0.97);}
      to{opacity:1;transform:translateX(0) scale(1);}
    }
    .msg-wrap.exiting{animation:msgSlideOut 0.38s cubic-bezier(0.4,0,1,1) forwards;}
    @keyframes msgSlideOut{
      from{opacity:1;transform:translateX(0) scale(1);max-height:200px;margin-top:0;}
      to{opacity:0;transform:translateX(28px) scale(0.96);max-height:0;margin-top:0;padding:0;}
    }

    .msg-card{
      display:flex;align-items:flex-start;gap:10px;
      background:var(--traje);
      border-top:2px solid var(--platform-color);
      border-left:3px solid var(--platform-color);
      border-right:1px solid rgba(10,8,6,0.2);
      border-bottom:1px solid rgba(10,8,6,0.2);
      border-radius:2px 6px 5px 3px;
      padding:10px 13px;
      box-shadow:var(--shadow);
      position:relative;overflow:hidden;
    }
    .msg-card::after{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:linear-gradient(135deg,rgba(255,255,255,0.025) 0%,transparent 55%);
    }

    /* Plataformas */
    .msg-card.twitch{--platform-color:#7b5ea7;}
    .msg-card.kick{--platform-color:#3a8a2a;}
    .msg-card.tiktok{--platform-color:#b0003a;}
    .msg-card.youtube{--platform-color:#a01010;}
    .msg-card.custom{--platform-color:rgba(200,37,28,0.8);}
    .msg-card.donation{--platform-color:#b8962a;}

    /* Avatar */
    .msg-avatar{
      width:var(--avatar-size);height:var(--avatar-size);min-width:var(--avatar-size);
      border-radius:50%;border:2px solid rgba(10,8,6,0.5);
      overflow:hidden;background:var(--guante);flex-shrink:0;
      box-shadow:1px 2px 0 rgba(10,8,6,0.3);filter:grayscale(25%);
    }
    .msg-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
    .msg-avatar-ico{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0.35;}

    /* Cuerpo */
    .msg-body{flex:1;min-width:0;}
    .msg-header{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;}
    .msg-name{
      font-family:var(--font-title);font-size:var(--name-font);
      color:var(--camisa);letter-spacing:0.5px;white-space:nowrap;
    }
    .msg-role{
      font-family:var(--font-mono);font-size:8px;padding:1px 5px;
      background:rgba(222,218,212,0.07);border:1px solid rgba(222,218,212,0.15);
      border-radius:2px;color:var(--camisa-dim);letter-spacing:0.5px;
    }
    .msg-platform-tag{
      font-family:var(--font-mono);font-size:7.5px;padding:1px 5px;
      border-radius:2px;font-weight:700;letter-spacing:0.5px;
      background:rgba(10,8,6,0.25);border:1px solid rgba(255,255,255,0.07);
      color:var(--camisa-muted);margin-left:auto;
    }
    .msg-text{
      font-family:var(--font-body);font-size:var(--msg-font);
      color:var(--camisa);line-height:1.55;word-break:break-word;
    }
    .msg-text img.emote{
      height:var(--emote-size);width:auto;vertical-align:middle;margin:0 2px;filter:grayscale(30%);
    }
    .msg-donation-bar{
      margin-top:6px;padding:4px 10px;
      background:rgba(184,150,42,0.15);border:1px solid rgba(184,150,42,0.35);
      border-radius:2px;font-family:var(--font-mono);font-size:9px;font-weight:700;
      color:#d4b44a;text-align:center;text-transform:uppercase;letter-spacing:1.5px;
    }
    .msg-donation-bar.gift{background:rgba(200,37,28,0.15);border-color:rgba(200,37,28,0.3);color:var(--corbata);}
    .msg-donation-bar.sub{background:rgba(145,70,255,0.12);border-color:rgba(145,70,255,0.3);color:#c9aff5;}
  </style>
</head>
<body>
<div id="chat-container"></div>
<script>
// ═══ CONFIG desde URL ═══
var params = new URLSearchParams(window.location.search);
var SERVER_URL  = params.get('server') || '';
var SHOW_TIME   = parseInt(params.get('showtime') || '12000');
var MAX_VISIBLE = parseInt(params.get('max') || '3');
var PLATFORM    = params.get('platform') || 'all'; // all | twitch | kick | tiktok | youtube

// ═══ DEDUPLICACION ═══
var _seenMids = {};

function hasSeen(mid) {
  if (!mid) return false;
  var now = Date.now();
  if (_seenMids[mid] && (now - _seenMids[mid]) < 8000) return true;
  _seenMids[mid] = now;
  // limpieza
  var keys = Object.keys(_seenMids);
  if (keys.length > 200) {
    var cutoff = now - 15000;
    keys.forEach(function(k) { if (_seenMids[k] < cutoff) delete _seenMids[k]; });
  }
  return false;
}

// ═══ ESTADO ═══
var ws = null, retryDelay = 1500;
var activeMessages = [];

// ═══ LOGOS SVG ═══
var LOGOS = {
  twitch: '🟣', kick: '🟢', tiktok: '🎵', youtube: '▶', custom: '⭐', system: '●'
};

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function parseTwitchEmotes(t, e) {
  if (!e || !e.length) return esc(t);
  var s = e.slice().sort(function(a,b){return a.start-b.start;}), r='', c=0;
  for (var i=0;i<s.length;i++) {
    var x=s[i];
    if (x.start>c) r+=esc(t.slice(c,x.start));
    r+='<img class="emote" src="'+esc(x.url)+'" alt="'+esc(x.text)+'" onerror="this.style.display=\'none\'">';
    c=x.end+1;
  }
  if (c<t.length) r+=esc(t.slice(c));
  return r;
}
function parseKickEmotes(t) {
  return esc(t).replace(/\[emote:(\d+):([^\]]+)\]/g, function(m,id,n){
    return '<img class="emote" src="https://files.kick.com/emotes/'+id+'/fullsize" alt="'+esc(n)+'" onerror="this.style.display=\'none\'">';
  });
}
function renderText(data) {
  var t = data.chatmessage || '', p = data.platform || data.type || '';
  if ((p==='twitch') && data.chatemotes && data.chatemotes.length) return parseTwitchEmotes(t, data.chatemotes);
  if (p==='kick') return parseKickEmotes(t);
  return esc(t);
}

function getPlatformTag(p) {
  if (p==='twitch')  return 'TWITCH';
  if (p==='kick')    return 'KICK';
  if (p==='tiktok')  return 'TIKTOK';
  if (p==='youtube') return 'YOUTUBE';
  if (p==='custom')  return 'CUSTOM';
  return (p||'').toUpperCase();
}

function getDonationBar(data) {
  if (data.type !== 'donation') return '';
  var dt = data.donationType || '', cls = 'msg-donation-bar', label = '';
  if (dt==='bits')      { label = '💎 '+data.amount+' Bits'; }
  else if (dt==='sub')  { cls+=' sub'; label = '★ Nuevo Sub'; }
  else if (dt==='resub'){ cls+=' sub'; label = '↺ Resub '+data.months+' meses'; }
  else if (dt==='subgift'){ cls+=' sub'; label = '✦ Sub Regalada'; }
  else if (dt==='giftedsub'){ cls+=' gift'; label = '✦ '+(data.amount||1)+' Sub'+(data.amount>1?'s':'')+' Regaladas'; }
  else if (dt==='superchat'){ label = '✦ '+(data.amountDisplay||data.amount||'Superchat'); }
  else if (dt==='member'){ cls+=' sub'; label = '★ Nuevo Miembro'; }
  else if (dt==='gift') { cls+=' gift'; label = '✦ '+(data.giftName||'Regalo')+' x'+(data.quantity||1); }
  else if (data.amount) { label = '✦ '+data.amount+(data.currency?' '+data.currency:''); }
  if (!label) return '';
  return '<div class="'+cls+'">'+label+'</div>';
}

function addMessage(data) {
  if (!data.chatname && !data.chatmessage) return;
  if (hasSeen(data.mid)) return;

  // Filtro de plataforma
  if (PLATFORM !== 'all') {
    var p = data.platform || data.type || '';
    if (p !== PLATFORM) return;
  }

  var platform = data.platform || data.type || 'custom';
  var isDonation = data.type === 'donation';

  // Crear elemento
  var wrap = document.createElement('div');
  wrap.className = 'msg-wrap';

  // Avatar HTML
  var avatarHTML = '';
  if (data.chatimg) {
    avatarHTML = '<img src="'+esc(data.chatimg)+'" alt="avatar" onerror="this.parentNode.innerHTML=\'<div class=msg-avatar-ico>'+esc(LOGOS[platform]||'●')+'</div>\'">';
  } else {
    avatarHTML = '<div class="msg-avatar-ico">'+esc(LOGOS[platform]||'●')+'</div>';
  }

  // Roles
  var rolesHTML = '';
  if (data.roles && data.roles.length) {
    data.roles.forEach(function(r){ rolesHTML += '<span class="msg-role">'+esc(r.label||r.type)+'</span>'; });
  }

  // Nombre con color
  var nameStyle = data.nameColor ? 'style="color:'+esc(data.nameColor)+';"' : '';

  var cardClass = 'msg-card ' + platform + (isDonation ? ' donation' : '');

  wrap.innerHTML =
    '<div class="'+cardClass+'">' +
      '<div class="msg-avatar">'+avatarHTML+'</div>' +
      '<div class="msg-body">' +
        '<div class="msg-header">' +
          '<span class="msg-name" '+nameStyle+'>'+esc(data.chatname||'?')+'</span>' +
          rolesHTML +
          '<span class="msg-platform-tag">'+getPlatformTag(platform)+'</span>' +
        '</div>' +
        '<div class="msg-text">'+renderText(data)+'</div>' +
        getDonationBar(data) +
      '</div>' +
    '</div>';

  var container = document.getElementById('chat-container');
  container.appendChild(wrap);

  var entry = { wrap: wrap, timer: null };
  activeMessages.push(entry);

  // Eliminar excedentes inmediatamente
  while (activeMessages.length > MAX_VISIBLE) {
    var old = activeMessages.shift();
    removeMessage(old);
  }

  // Auto-remove después del tiempo
  entry.timer = setTimeout(function() {
    var idx = activeMessages.indexOf(entry);
    if (idx !== -1) activeMessages.splice(idx, 1);
    removeMessage(entry);
  }, SHOW_TIME);
}

function removeMessage(entry) {
  if (!entry.wrap.parentNode) return;
  if (entry.timer) { clearTimeout(entry.timer); entry.timer = null; }
  entry.wrap.classList.add('exiting');
  setTimeout(function() {
    if (entry.wrap.parentNode) entry.wrap.parentNode.removeChild(entry.wrap);
  }, 400);
}

// ═══ WEBSOCKET ═══
function connect() {
  if (!SERVER_URL) return;
  var wu = SERVER_URL.replace(/^https?/, 'ws').replace(/\/$/, '');
  try { ws = new WebSocket(wu); } catch(e) { setTimeout(connect, retryDelay); return; }

  ws.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.type === 'status') return;
      if (data.type === 'highlight_clear') return;
      addMessage(data);
    } catch(err) {}
  };
  ws.onclose = function() {
    retryDelay = Math.min(retryDelay * 1.5, 30000);
    setTimeout(connect, retryDelay);
  };
  ws.onopen = function() { retryDelay = 1500; };
  ws.onerror = function() { ws.close(); };
}

connect();
</script>
</body>
</html>
